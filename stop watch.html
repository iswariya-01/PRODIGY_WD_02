<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch App</title>

<style>
    body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #667eea, #764ba2);
        font-family: Arial, sans-serif;
    }

    .stopwatch {
        background: white;
        padding: 30px;
        border-radius: 15px;
        text-align: center;
        width: 320px;
        box-shadow: 0 15px 30px rgba(0,0,0,0.2);
    }

    h1 {
        font-size: 45px;
        margin-bottom: 20px;
    }

    .buttons button {
        padding: 10px 15px;
        margin: 5px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        background: #667eea;
        color: white;
        transition: 0.3s;
    }

    .buttons button:hover {
        opacity: 0.8;
    }

    #laps {
        margin-top: 20px;
        text-align: left;
        max-height: 150px;
        overflow-y: auto;
        padding: 0;
    }

    #laps li {
        list-style: none;
        padding: 5px;
        border-bottom: 1px solid #eee;
        font-size: 14px;
    }
</style>
</head>

<body>

<div class="stopwatch">
    <h1 id="display">00:00:00</h1>

    <div class="buttons">
        <button onclick="start()">Start</button>
        <button onclick="pause()">Pause</button>
        <button onclick="reset()">Reset</button>
        <button onclick="lap()">Lap</button>
    </div>

    <ul id="laps"></ul>
</div>

<script>
let startTime;
let updatedTime;
let difference = 0;
let timerInterval;
let running = false;

function start() {
    if (!running) {
        startTime = new Date().getTime() - difference;
        timerInterval = setInterval(updateTime, 10);
        running = true;
    }
}

function pause() {
    if (running) {
        clearInterval(timerInterval);
        difference = new Date().getTime() - startTime;
        running = false;
    }
}

function reset() {
    clearInterval(timerInterval);
    document.getElementById("display").innerText = "00:00:00";
    document.getElementById("laps").innerHTML = "";
    difference = 0;
    running = false;
}

function lap() {
    if (running) {
        const lapTime = document.getElementById("display").innerText;
        const li = document.createElement("li");
        li.innerText = "Lap " + (document.getElementById("laps").children.length + 1) + " - " + lapTime;
        document.getElementById("laps").appendChild(li);
    }
}

function updateTime() {
    updatedTime = new Date().getTime() - startTime;

    let minutes = Math.floor((updatedTime / (1000 * 60)) % 60);
    let seconds = Math.floor((updatedTime / 1000) % 60);
    let milliseconds = Math.floor((updatedTime % 1000) / 10);

    minutes = minutes < 10 ? "0" + minutes : minutes;
    seconds = seconds < 10 ? "0" + seconds : seconds;
    milliseconds = milliseconds < 10 ? "0" + milliseconds : milliseconds;

    document.getElementById("display").innerText =
        minutes + ":" + seconds + ":" + milliseconds;
}
</script>

</body>
</html>
