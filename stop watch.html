<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task-02 | Stopwatch Web Application</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

/* Main Container */
.container{
    width:380px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    padding:40px 30px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
    position:relative;
    overflow:hidden;
}

/* Gradient Half Circle */
.container::before{
    content:"";
    position:absolute;
    width:300px;
    height:300px;
    background:linear-gradient(45deg,#00f5ff,#00ff94);
    border-radius:50%;
    top:-180px;
    left:-100px;
    z-index:-1;
    filter:blur(60px);
}

/* Headings */
h1{
    font-size:28px;
    margin-bottom:5px;
}

.sub{
    font-size:14px;
    opacity:0.7;
    margin-bottom:25px;
}

/* Timer Display */
.time{
    font-size:42px;
    font-weight:bold;
    margin:20px 0;
    letter-spacing:2px;
}

/* Buttons */
.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:20px;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-weight:600;
    transition:0.3s ease;
}

.start{
    background:#00ff94;
    color:#000;
}

.pause{
    background:#ffc107;
    color:#000;
}

.reset{
    background:#ff4d4d;
    color:#fff;
}

button:hover{
    transform:scale(1.1);
}

/* Lap Section */
.laps{
    max-height:120px;
    overflow-y:auto;
    text-align:left;
    margin-top:10px;
}

.laps div{
    padding:6px 10px;
    background:rgba(255,255,255,0.08);
    margin-bottom:6px;
    border-radius:10px;
    font-size:14px;
}

/* Footer */
.footer{
    margin-top:20px;
    font-size:13px;
    opacity:0.6;
}
</style>
</head>

<body>

<div class="container">

    <h1>Stopwatch</h1>
    <div class="sub">Web Application | Task-02</div>

    <div class="time" id="display">00:00:00</div>

    <div class="buttons">
        <button class="start" onclick="start()">Start</button>
        <button class="pause" onclick="pause()">Pause</button>
        <button class="reset" onclick="reset()">Reset</button>
        <button onclick="lap()">Lap</button>
    </div>

    <div class="laps" id="laps"></div>

    <div class="footer">
        ProDigy Infotech | Task-02
    </div>

</div>

<script>
let timer;
let seconds = 0;
let minutes = 0;
let hours = 0;
let running = false;

function updateDisplay(){
    let h = hours < 10 ? "0" + hours : hours;
    let m = minutes < 10 ? "0" + minutes : minutes;
    let s = seconds < 10 ? "0" + seconds : seconds;
    document.getElementById("display").innerText = h + ":" + m + ":" + s;
}

function start(){
    if(!running){
        running = true;
        timer = setInterval(()=>{
            seconds++;
            if(seconds == 60){
                seconds = 0;
                minutes++;
            }
            if(minutes == 60){
                minutes = 0;
                hours++;
            }
            updateDisplay();
        },1000);
    }
}

function pause(){
    running = false;
    clearInterval(timer);
}

function reset(){
    running = false;
    clearInterval(timer);
    seconds = 0;
    minutes = 0;
    hours = 0;
    updateDisplay();
    document.getElementById("laps").innerHTML = "";
}

function lap(){
    if(running){
        let lapTime = document.getElementById("display").innerText;
        let lapItem = document.createElement("div");
        lapItem.innerText = "Lap: " + lapTime;
        document.getElementById("laps").appendChild(lapItem);
    }
}
</script>

</body>
</html>
